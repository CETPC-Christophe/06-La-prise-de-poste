<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QCM CACES – La prise de poste</title>
<style>
  /* ---------- Thème & layout ---------- */
  :root { --orange:#ff6600; --noir:#222; --gris:#f3f3f3; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--gris);
    color: var(--noir);
    margin: 0;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:16px;
    box-sizing:border-box;
  }

  .banner { background:var(--noir); color:#fff; padding:10px; border-radius:10px; text-align:center; font-weight:700; margin-bottom:15px; width:100%; max-width:820px; box-sizing:border-box; }
  h1 { color:var(--orange); margin:8px 0; text-align:center; }
  .subtitle { color:#555; text-align:center; margin-bottom:18px; }

  /* Card question */
  .question {
    background:#fff;
    padding:16px;
    margin:8px auto;
    border-left:8px solid var(--orange);
    border-radius:10px;
    box-shadow:0 3px 6px rgba(0,0,0,0.08);
    width:100%;
    max-width:820px;
    box-sizing:border-box;
    text-align:center;
  }
  .question p { font-weight:600; margin:8px 0; }

  /* Réponses (liste) */
  .answers { display:flex; flex-direction:column; align-items:center; gap:8px; margin-top:6px; }
  .answers label {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; max-width:520px; padding:8px 10px; border-radius:8px; cursor:pointer;
    border:1px solid #eee;
  }
  .answers input[type="radio"] { transform:scale(1.05); }

  /* Boutons */
  button {
    background:var(--orange);
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:1rem;
    cursor:pointer;
  }
  button[disabled] { opacity:0.6; cursor:default; }
  button:hover:not([disabled]) { background:#e65c00; }

  .footer { text-align:center; color:#777; margin-top:20px; font-size:0.9rem; }

  @media (max-width:600px) {
    .question{ padding:14px; max-width:95%; }
    .answers label{ max-width:100%; }
    button{ padding:10px 14px; }
  }
</style>
</head>
<body>

  <!-- Banniere + titre -->
  <div class="banner" id="quizBanner">🚧 La prise de poste 🚜</div>
  <h1>ÉVALUATION</h1>
  <p class="subtitle" id="quizSubtitle">Répondez aux questions tirées au hasard</p>

  <!-- Ecran d'accueil : saisie du nom -->
  <div id="intro" style="width:100%; max-width:820px; display:flex; justify-content:center;">
    <div class="question" style="text-align:center;">
      <p><strong>Bienvenue</strong></p>
      <p>Merci d'indiquer votre nom (pas le prénom) avant de commencer :</p>
      <input id="candidateName" type="text" placeholder="Nom de l'élève"
             style="padding:8px; width:80%; max-width:320px; border-radius:6px; border:1px solid #ccc;">
      <div style="margin-top:12px;">
        <button id="startBtn" disabled>➡️ Suivant</button>
      </div>
    </div>
  </div>

  <!-- Conteneur des questions rendu dynamiquement -->
  <div id="quiz" style="width:100%; max-width:820px; min-height:220px; display:none; align-items:center; justify-content:center;"></div>

  <!-- Zone d'état et bouton 'nouvelle évaluation' -->
  <div style="width:100%; max-width:820px; text-align:center; margin-top:12px;">
    <button id="restartBtn" style="display:none;">🔄 Nouvelle évaluation</button>
    <div id="saveStatus" style="margin-top:8px; color:#444; font-size:0.95rem;"></div>
  </div>

  <p id="result" style="text-align:center; font-weight:700; margin-top:14px;"></p>
  <p class="footer">© Formation Sécurité CACES® R482A – Quiz interactif</p>

<script>
/* ============================
   CONFIG
   ============================ */

/* Nom visible du quiz */
const QUIZ_NAME = "La prise de poste";

/* URL Google Apps Script (fourni) */
const RESULTS_ENDPOINT = "https://script.google.com/macros/s/AKfycbzSnnlxH2dCzkVqobrQX-E4n4lo-WcxoDvmLHr7cLn35d4xploO_K3p9tNuY0OweRsW/exec";

/* ============================
   QUESTIONS (source)
   - tableau d'objets { text, answers[], correct }
   - on peut facilement modifier / ajouter des questions
   ============================ */
const allQuestions = [
  {"text":"Pour effectuer la prise de poste, je dois me munir des équipements de protection individuelle.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"A la prise de poste, je dois consulter les consignes d'utilisation de l'engin.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"A la prise de poste, je dois consulter le carnet d'entretien.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"A la prise de poste, je dois consulter le registre d'observations.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"A la prise de poste, je prends connaissance de l'organisation du chantier.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"A la prise de poste, je n'ai pas besoin de prendre connaissance de l'organisation du chantier.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"A la prise de poste, je prends connaissance de la sécurité du chantier.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Pour effectuer la prise de poste, je n'ai pas besoin de me munir des équipements de protection individuelle.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"A la prise de poste, je n'ai pas besoin de consulter les consignes d'utilisation de l'engin.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"A la prise de poste, je n'ai pas besoin de consulter le carnet d'entretien.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"A la prise de poste, je n'ai pas besoin de consulter le registre d'observations.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"A la prise de poste, je n'ai pas besoin de prendre connaissance de la sécurité du chantier.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"A la prise de poste, je prends connaissance du travail à effectuer.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Le chef d'entreprise doit mettre à la disposition des conducteurs des EPI appropriés.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"A la prise de poste, je n'ai pas besoin de prendre connaissance du travail à effectuer.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Le chef d'entreprise n'est pas obligé de mettre à la disposition des conducteurs des EPI appropriés.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"L'adéquation permet de savoir si le travail demandé est réalisable.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Avant de commencer son travail, le conducteur doit vérifier l'absence de fuites.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Avant de commencer son travail, le conducteur doit vérifier l'état général de l'engin.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Avant de commencer son travail, le conducteur doit vérifier la pression des chenilles.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Avant de commencer son travail, le conducteur doit vérifier le niveau d'huile moteur.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Avant de commencer son travail, le conducteur doit vérifier l'état des vérins.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Avant de commencer son travail, le conducteur doit vérifier l'état du démarreur.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Avant de commencer son travail, le conducteur doit vérifier l'état des flexibles.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"La ceinture de sécurité n'est pas obligatoire dans un engin.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"J'applique la règle des trois appuis seulement pour monter dans l'engin.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"J'applique la règle des trois appuis seulement pour descendre de l'engin.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"J'applique la règle des trois appuis pour monter et descendre de l'engin.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Exceptionnellement, je peux mettre en route un engin en étant hors du poste de conduite.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Lors des essais de fin de poste, le conducteur doit tester les avertisseurs.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Lors des essais de fin de poste, le conducteur ne teste pas l'essuie-glace de son engin.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Lors des essais de fin de poste, le conducteur teste les éclairages.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Lors des essais de fin de poste, le conducteur ne doit signaler que les anomalies graves.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Lors des essais de fin de poste sur un bouteur, le conducteur ne teste pas le frein de parc.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Lors des essais de fin de poste, le conducteur note les anomalies dans le registre d'observations.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Un engin de moins de 6 tonnes doit avoir des VGP de moins de 6 mois.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Les VGP sont réalisées tous les 6 mois pour les engins de levage.","answers":["Vrai","Faux"],"correct":"Vrai"},
  {"text":"Les VGP sont réalisées tous les 6 mois pour les engins de terrassement.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Les VGP sont réalisées tous les 12 mois pour les engins de levage.","answers":["Vrai","Faux"],"correct":"Faux"},
  {"text":"Les VGP sont réalisées tous les 12 mois pour les engins de terrassement.","answers":["Vrai","Faux"],"correct":"Vrai"}
];

/* ============================
   Variables d'état
   ============================ */
let selectedQuestions = [];
let currentIndex = 0;
let userAnswers = [];
let candidateName = "";

/* ============================
   Utilitaires
   ============================ */

/**
 * formate une date ISO en "JJ/MM/AAAA HH:MM:SS"
 */
function formatDateTime(isoString) {
  const date = new Date(isoString);
  const d = String(date.getDate()).padStart(2,'0');
  const m = String(date.getMonth()+1).padStart(2,'0');
  const y = date.getFullYear();
  const hh = String(date.getHours()).padStart(2,'0');
  const min = String(date.getMinutes()).padStart(2,'0');
  const sec = String(date.getSeconds()).padStart(2,'0');
  return `${d}/${m}/${y} ${hh}:${min}:${sec}`;
}

/**
 * Renvoie N questions aléatoires en évitant celles déjà sorties récemment
 * (stockées dans localStorage sous "usedQuestions").
 */
function getRandomQuestions(num) {
  let used = JSON.parse(localStorage.getItem("usedQuestions") || "[]");
  let available = allQuestions.filter(q => !used.includes(q.text));

  // si plus assez d'items disponibles, on réinitialise la mémoire
  if (available.length < num) {
    used = [];
    available = [...allQuestions];
  }

  // shuffle rapide et slice
  available.sort(() => Math.random() - 0.5);
  const selected = available.slice(0, num);
  selected.forEach(q => used.push(q.text));
  localStorage.setItem("usedQuestions", JSON.stringify(used));
  return selected;
}

/* ============================
   Affichage et navigation
   ============================ */

/**
 * Affiche l'écran d'intro (saisie du nom)
 * NOTE: on utilise .oninput pour ne pas empiler plusieurs event listeners
 */
function showIntro() {
  document.getElementById('intro').style.display = 'flex';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('result').textContent = '';
  document.getElementById('saveStatus').textContent = '';

  const nameInput = document.getElementById('candidateName');
  const startBtn = document.getElementById('startBtn');

  // reset valeur et bouton
  nameInput.value = "";
  startBtn.disabled = true;

  // affecte un seul handler (pas addEventListener multiple fois)
  nameInput.oninput = () => {
    startBtn.disabled = nameInput.value.trim() === "";
  };
}

/**
 * Démarre le quiz
 */
function startQuiz() {
  candidateName = document.getElementById('candidateName').value.trim();
  if (!candidateName) return;

  // préparer interface
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'flex';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('saveStatus').textContent = '';

  // tirer les questions, réinitialiser l'état
  selectedQuestions = getRandomQuestions(20);
  currentIndex = 0;
  userAnswers = new Array(selectedQuestions.length).fill("");

  // mettre à jour le sous-titre
  document.getElementById('quizSubtitle').textContent = `Répondez à ${selectedQuestions.length} questions tirées au hasard`;

  // afficher première question
  renderQuestion();

  // protéger contre retour arrière simple (optionnel)
  try {
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', () => history.pushState(null, null, location.href));
  } catch(e) { /* ignore */ }
}

/**
 * Affiche la question courante avec le bouton interne "Suivant/Terminer"
 * Le bouton est rendu dans la carte et activé seulement après sélection.
 */
function renderQuestion() {
  const q = selectedQuestions[currentIndex];

  // construire les options (radio)
  const optionsHtml = q.answers.map((a, idx) => {
    // on ajoute un id unique pour le label-for si besoin
    const inputId = `q${currentIndex}_opt${idx}`;
    return `<label for="${inputId}">
              <input id="${inputId}" type="radio" name="q" value="${a}">
              ${a}
            </label>`;
  }).join("");

  // injecter le HTML de la question + bouton interne
  document.getElementById('quiz').innerHTML = `
    <div class="question">
      <p>⚙️ <strong>Question ${currentIndex + 1} :</strong> ${q.text}</p>
      <div class="answers">
        ${optionsHtml}
      </div>

      <!-- Bouton intégré dans la carte (Suivant / Terminer) -->
      <div style="margin-top:15px; text-align:center;">
        <button id="nextBtnInternal" disabled>
          ${(currentIndex === selectedQuestions.length - 1) ? "🏁 Terminer" : "➡️ Suivant"}
        </button>
      </div>
    </div>
  `;

  // récupération du bouton interne et association de l'action
  const nextBtn = document.getElementById('nextBtnInternal');
  nextBtn.addEventListener('click', nextQuestion);

  // activer le bouton dès qu'une réponse est choisie
  document.querySelectorAll('input[name="q"]').forEach(radio => {
    radio.addEventListener('change', () => { nextBtn.disabled = false; });
  });
}

/**
 * Fonction appelée quand l'utilisateur clique sur le bouton 'Suivant' interne.
 * Elle enregistre la réponse et navigue (ou termine).
 */
function nextQuestion() {
  const selection = document.querySelector('input[name="q"]:checked');
  if (!selection) return; // sécurité

  // enregistrer la réponse
  userAnswers[currentIndex] = selection.value;

  // si on n'est pas à la dernière question, avancer
  if (currentIndex < selectedQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
    return;
  }

  // sinon, fin du quiz : afficher résultats et envoyer au sheet
  showResults();
}

/* ============================
   Envoi des résultats (Google Sheets)
   ============================ */

/**
 * Construit l'objet qui sera envoyé au serveur (Apps Script)
 */
function buildResultObject() {
  const now = new Date();
  let score = 0;
  const details = selectedQuestions.map((q, i) => {
    const given = userAnswers[i] || "";
    if (given === q.correct) score++;
    return { question: q.text, given: given, correct: q.correct };
  });

  return {
    timestamp: now.toISOString(),
    candidate: candidateName,
    score: score,
    total: selectedQuestions.length,
    details: details,
    quiz: QUIZ_NAME
  };
}

/**
 * Envoie les résultats vers l'endpoint Google Apps Script.
 * NOTE: mode 'no-cors' utilisé pour compatibilité côté Apps Script (si besoin on peut améliorer).
 */
function sendResults() {
  const payload = buildResultObject();
  const statusEl = document.getElementById('saveStatus');

  if (!RESULTS_ENDPOINT) {
    statusEl.textContent = "Aucun endpoint configuré.";
    return Promise.reject(new Error("Aucun endpoint configuré"));
  }

  statusEl.textContent = "Envoi en cours...";

  return fetch(RESULTS_ENDPOINT, {
    method: "POST",
    mode: "no-cors", // garde ceci si ton Apps Script ne gère pas CORS
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    // En mode no-cors, on ne peut pas lire la réponse ; on suppose que c'est OK
    statusEl.textContent = "Envoi réussi ✔️";
  })
  .catch(err => {
    statusEl.textContent = "Erreur envoi: " + err.message;
    return Promise.reject(err);
  });
}

/* ============================
   Affichage final des résultats
   ============================ */
function showResults() {
  // état de vérification
  document.getElementById('quiz').innerHTML = `<div class="question"><p>⚙️ Vérification de vos réponses...</p></div>`;
  document.getElementById('saveStatus').textContent = '';

  // envoyer puis afficher le score (même si no-cors)
  sendResults().then(() => {
    const score = userAnswers.filter((ans, i) => ans === selectedQuestions[i].correct).length;
    const timestamp = formatDateTime(new Date().toISOString());

    document.getElementById('quiz').innerHTML = `
      <div class="question">
        <p>🏷️ Candidat : <strong>${candidateName}</strong></p>
        <p>🏁 Résultat : <span style="color:var(--orange); font-weight:700;">${score}</span> / ${selectedQuestions.length}</p>
        <p>⏱️ Réalisé le : <strong>${timestamp}</strong></p>
      </div>
    `;
    document.getElementById('restartBtn').style.display = 'inline-block';
  })
  .catch((/*err*/) => {
    // en cas d'erreur d'envoi on affiche le message d'erreur et on propose de revenir
    document.getElementById('quiz').innerHTML = `<div class="question"><p>❌ Erreur lors de l'envoi des résultats. Veuillez réessayer.</p></div>`;
    document.getElementById('restartBtn').style.display = 'inline-block';
  });
}

/* ============================
   Redémarrer / Initialisation
   ============================ */
function restartQuiz() {
  showIntro();
}

/* Initialisation des handlers qui ne doivent être attachés qu'une fois */
document.addEventListener('DOMContentLoaded', () => {
  // bannière
  document.getElementById('quizBanner').textContent = `🚧 ${QUIZ_NAME} 🚜`;

  // bouton démarrer
  document.getElementById('startBtn').addEventListener('click', startQuiz);

  // bouton recommencer
  document.getElementById('restartBtn').addEventListener('click', restartQuiz);

  // afficher écran d'accueil
  showIntro();
});
</script>
</body>
</html>
